keyboard_test:
  ros__parameters:
    cmd_vel_topic: /cmd_vel_keyboard
    linear_speed: 5.0
    gimbal_yaw_speed: 7.0

chassis:
  ros__parameters:
    keyboard_cmd_vel_topic: /cmd_vel_keyboard
    nav_cmd_vel_topic: /cmd_vel_processed
    cmd_vel_out_topic: /cmd_vel_chassis
    publish_rate: 100.0
    small_gyro_spin_rate: 6.0
    small_gyro_toggle_timeout_sec: 1.0

sentry_sim_node:
  ros__parameters:
    robot_init_location: [-4.0,-4.0,0.5]
    left_lidar_ip: 192.168.10.4
    right_lidar_ip: 192.168.10.5
    mid360_points_per_scan: 24000
    use_keep_stand: false
    chassis_cmd_vel_topic: /cmd_vel_chassis
    cmd_vel_timeout_sec: 0.5
    chassis_linear_accel_limit: 8.0
    chassis_angular_accel_limit: 10.0
    gimbal_angular_accel_limit: 10.0
    tilt_downforce_threshold_deg: 10.0
    tilt_downforce_scale: 300.0
    tilt_downforce_exp_gain: 6.0
    boundary_x_min: -13.6
    boundary_x_max: 13.6
    boundary_y_min: -7.0
    boundary_y_max: 7.0
