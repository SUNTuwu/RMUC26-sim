keyboard_test:
  ros__parameters:
    cmd_vel_topic: /sim/keyboard/cmd_vel
    focus_topic: /sim/focus
    linear_speed: 3.0
    gimbal_yaw_speed: 10.0
    tty_device: /dev/tty
    tty_key_timeout_sec: 0.3

chassis_adapter:
  ros__parameters:
    keyboard_cmd_vel_topic: /sim/keyboard/cmd_vel
    cmd_vel_out_topic: /sim/cmd_vel
    publish_rate: 100.0
    small_gyro_spin_rate: 6.0
    small_gyro_toggle_timeout_sec: 1.0
    linear_cmd_timeout_sec: 0.5

imu_adapter:
  ros__parameters:
    imu_ips: ["192.168.10.4", "192.168.10.5"]
    imu_low_pass_cutoff_hz: 60.0

sentry_sim_node:
  ros__parameters:
    robot_init_location: [-4.0,-4.0,0.4]
    physics_dt: 0.002 # /clock follows every physics step: 500 Hz
    physics_integrator: implicitfast # implicit/implicitfast/Euler/RK4
    contact_solref: [0.03, 1.2] # [time constant, damping ratio]
    contact_solimp: [0.9, 0.95, 0.001, 0.5, 2.0]
    imu_rate: 500.0

    # Viewer Camera Config
    viewer_camera_distance: 10.0
    viewer_camera_azimuth: 135.0
    viewer_camera_elevation: -40.0
    viewer_focus_topic: /sim/focus
    viewer_focus_on_start: true
    viewer_focus_yaw_offset_deg: 0.0
    viewer_focus_smoothing_time_sec: 0.5
    viewer_manual_camera_timeout_sec: 1.0
    viewer_manual_camera_position_epsilon: 0.00001
    viewer_manual_camera_angle_epsilon_deg: 0.001

    left_lidar_ip: 192.168.10.4
    right_lidar_ip: 192.168.10.5
    mid360_points_per_scan: 8000
    livox_point_offset_step_ns: 0
    livox_reflectivity_max: 70.0
    livox_reflectivity_decay_meters: 2.0

    # livox lidar config
    enable_left_livox: true # enable both lidar and imu for left lidar - display, collision, and topic pub
    enable_right_livox: true # enable both lidar and imu for right lidar - display, collision, and topic pub

    livox_imu_offset_xyz: [0.011, 0.02329, -0.04412]
    livox_imu_rpy: [0.0, 0.0, 0.0]
    gimbal_visual_half_extents_xyz: [0.11, 0.11, 0.04]
    gimbal_collision_half_extents_xyz: [0.17, 0.17, 0.09]
    gimbal_body_mass: 0.001
    gimbal_body_diaginertia_xyz: [0.000001, 0.000001, 0.000001]
    base_bottom_height: 0.03 # chassis lower surface above local ground z=0
    base_top_height: 0.16 # chassis upper surface above local ground z=0
    base_diameter: 0.59
    base_body_mass: 20.0
    enable_base_border: true
    base_border_size_xyz: [0.48, 0.48, 0.03] # full dimensions [length, width, height]
    wheel_spacing_x: 0.38 # front-to-rear sphere center spacing
    wheel_spacing_y: 0.38 # left-to-right sphere center spacing
    wheel_diameter: 0.11
    wheel_contact_solref: [0.05, 1.2] # softer than the global chassis contact
    wheel_contact_solimp: [0.8, 0.95, 0.003, 0.5, 2.0]
    base_direction_arrow_length: 0.35
    gimbal_direction_arrow_length: 0.25
    direction_arrow_radius: 0.01
    base_direction_arrow_rgba: [1.0, 0.5, 0.0, 1.0] # orange
    gimbal_direction_arrow_rgba: [1.0, 0.05, 0.05, 1.0] # red
    livox_visual_radius: 0.035
    livox_visual_height: 0.05
    livox_body_mass: 0.265
    livox_body_diaginertia_xyz: [0.0001, 0.0001, 0.0001]
    frame_origin_debug_radius: 0.018
    gimbal_origin_debug_radius: 0.02
    livox_origin_debug_radius: 0.015
    imu_origin_debug_radius: 0.01
    lidar_site_radius: 0.01
    imu_site_radius: 0.006
    imu_accel_debug_radius: 0.003
    imu_accel_debug_scale: 0.12
    imu_accel_debug_min_length: 0.01
    base_force_debug_radius: 0.01
    base_force_debug_scale: 0.006
    base_force_debug_min_length: 0.05
    boundary_wall_thickness: 0.05
    boundary_wall_height: 1.2

    chassis_cmd_vel_topic: /sim/cmd_vel
    cmd_vel_timeout_sec: 0.5

    # Chassis PD Control
    chassis_linear_accel_limit: 30.0
    chassis_velocity_p_gain: 200.0
    chassis_velocity_d_gain: 10.0
    chassis_max_force: 500.0
    chassis_angular_accel_limit: 20.0
    chassis_angular_velocity_p_gain: 12.0
    chassis_angular_velocity_d_gain: 0.5
    chassis_max_torque: 50.0

    # Gimbal PD Control
    gimbal_angular_accel_limit: 20.0
    gimbal_angular_velocity_p_gain: 10.0
    gimbal_angular_velocity_d_gain: 0.01
    gimbal_max_torque: 10.0

    #Arena Boundary
    boundary_x_min: -13.6
    boundary_x_max: 13.6
    boundary_y_min: -7.0
    boundary_y_max: 7.0
